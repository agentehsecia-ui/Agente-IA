<!-- Abrir este archivo en Chrome para generar los íconos PNG -->
<!-- Clic derecho en cada imagen → Guardar imagen como → guardar en public/icons/ -->
<html>
<body style="background:#f0f0f0; padding:40px; font-family:Arial">
<h2>Íconos SIGACP — clic derecho → Guardar imagen como</h2>
<p>Guardar en la carpeta <code>public/icons/</code></p>

<h3>icon-192.png</h3>
<canvas id="c192" width="192" height="192"></canvas>

<h3>icon-512.png</h3>
<canvas id="c512" width="512" height="512"></canvas>

<script>
function draw(canvas) {
  const s = canvas.width
  const ctx = canvas.getContext('2d')
  ctx.fillStyle = '#1e40af'
  ctx.beginPath()
  ctx.roundRect(0, 0, s, s, s * 0.18)
  ctx.fill()

  ctx.fillStyle = 'white'
  ctx.font = `bold ${s * 0.23}px Arial`
  ctx.textAlign = 'center'
  ctx.fillText('SIG', s/2, s * 0.38)

  ctx.fillStyle = '#93c5fd'
  ctx.fillText('ACP', s/2, s * 0.65)

  ctx.fillStyle = '#3b82f6'
  ctx.fillRect(s*0.2, s*0.73, s*0.6, s*0.01)

  ctx.fillStyle = '#93c5fd'
  ctx.font = `${s * 0.07}px Arial`
  ctx.fillText('Control de Pagos', s/2, s * 0.84)

  // Convertir a imagen para poder guardar
  const img = new Image()
  img.src = canvas.toDataURL('image/png')
  canvas.parentNode.insertBefore(img, canvas.nextSibling)
}

draw(document.getElementById('c192'))
draw(document.getElementById('c512'))
</script>
</body>
</html>
